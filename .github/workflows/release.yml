name: Release

on:
  push:
    tags: [v*]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
      ARCHIVE_NAME: viser-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.ext }}

    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        run: |
          rustup update stable --no-self-update
          rustup target add ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Build
        run: cargo build --release -p viser-cli --target ${{ matrix.target }}

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "${ARCHIVE_NAME}" viser

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a "${ARCHIVE_NAME}" viser.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.ARCHIVE_NAME }}

  release:
    name: Create GitHub Release
    needs: [build]

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true
          path: /tmp/assets

      - name: Checksums
        working-directory: /tmp/assets
        run: |
          for f in *; do
            [[ "$f" != *.sha256 ]] && shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Generate release notes
        run: |
          VERSION="${{ github.ref_name }}"
          awk -v ver="[${VERSION}]" \
            '$0 ~ "^## " ver " - " { found=1; next }
             found && /^## / { exit }
             found { print }' \
            CHANGELOG.md > /tmp/release-notes.md

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: viser ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          files: /tmp/assets/*
          fail_on_unmatched_files: true

  formula:
    name: Homebrew formula
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Fetch source tarball SHA
        run: |
          tag="${{ github.ref_name }}"
          url="https://github.com/vbasky/viser/archive/refs/tags/${tag}.tar.gz"
          sha=$(curl -sL "${url}" | shasum -a 256 | cut -d' ' -f1)

          cat <<RUBY
          class Viser < Formula
            desc "Video Encoding Optimizer — per-content bitrate ladders from R-D analysis"
            homepage "https://github.com/vbasky/viser"
            url "https://github.com/vbasky/viser/archive/refs/tags/${tag}.tar.gz"
            sha256 "${sha}"
            license "MIT"

            depends_on "rust" => :build
            depends_on "fontconfig"

            def install
              system "cargo", "install",
                *std_cargo_args(path: "crates/viser-cli")
            end

            test do
              assert_match version.to_s,
                shell_output("\#{bin}/viser --version")
            end
          end
          RUBY

  publish-crates:
    name: Publish crates.io packages
    needs: [release]
    runs-on: ubuntu-latest
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        run: rustup update stable --no-self-update

      - name: Publish crates in dependency order
        shell: bash
        run: |
          set -euo pipefail

          version="${VERSION#v}"
          crates=(
            viser-ffmpeg
            viser-quality
            viser-hull
            viser-ladder
            viser-shot
            viser-complexity
            viser-encoding
            viser-checkpoint
            viser-pertitle
            viser-pershot
            viser-persegment
            viser-contextaware
            viser-compare
            viser-chart
            viser-cli
          )

          crate_published() {
            local crate="$1"
            local http_status
            http_status=$(curl -s -o /dev/null -w '%{http_code}' \
              "https://crates.io/api/v1/crates/${crate}/${version}")
            [[ "$http_status" == "200" ]]
          }

          publish_with_retries() {
            local crate="$1"
            local attempts=5
            local delay=20

            if crate_published "$crate"; then
              echo "==> ${crate} ${version} already published; skipping"
              return 0
            fi

            for attempt in $(seq 1 "$attempts"); do
              echo "==> Publishing ${crate} ${version} (attempt ${attempt}/${attempts})"
              if cargo publish -p "$crate" --locked; then
                return 0
              fi

              if crate_published "$crate"; then
                echo "==> ${crate} ${version} became available after publish attempt; continuing"
                return 0
              fi

              if [[ "$attempt" -lt "$attempts" ]]; then
                echo "==> Waiting ${delay}s before retry"
                sleep "$delay"
              fi
            done

            echo "ERROR: failed to publish ${crate} ${version} after ${attempts} attempts" >&2
            return 1
          }

          for crate in "${crates[@]}"; do
            publish_with_retries "$crate"
          done
