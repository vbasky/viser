name: Release

on:
  push:
    tags: [v*]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        run: |
          rustup update stable --no-self-update
          rustup target add ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Build
        run: cargo build --release -p viser-cli --target ${{ matrix.target }}

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          archive="viser-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar czf "${archive}" viser
          echo "archive_name=${archive}" >> "$GITHUB_ENV"

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          archive="viser-${{ github.ref_name }}-${{ matrix.target }}.zip"
          7z a "${archive}" viser.exe
          echo "archive_name=${archive}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.archive_name }}

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true
          path: /tmp/assets

      - name: Checksums
        working-directory: /tmp/assets
        run: |
          for f in *; do
            [[ "$f" != *.sha256 ]] && shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Generate release notes
        run: |
          VERSION="${{ github.ref_name }}"
          awk -v ver="${VERSION#v}" \
            '$0 ~ "^## \\[" ver "\\] - " { found=1; next }
             found && /^## / { exit }
             found { print }' \
            CHANGELOG.md > /tmp/release-notes.md

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: viser ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          files: /tmp/assets/*
          fail_on_unmatched_files: true

  publish-crates:
    name: Publish crates.io packages
    needs: [release]
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        run: rustup update stable --no-self-update

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev cmake

      - name: Publish crates in dependency order
        shell: bash
        run: |
          set -euo pipefail

          version="${VERSION#v}"
          crates=(
            viser-ffmpeg
            viser-quality
            viser-metrics
            viser-hull
            viser-ladder
            viser-shot
            viser-complexity
            viser-encoding
            viser-checkpoint
            viser-pertitle
            viser-pershot
            viser-persegment
            viser-contextaware
            viser-compare
            viser-chart
            viser
            viser-cli
          )

          already_published() {
            local crate="$1"
            local v="$2"
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/${crate}/${v}")
            [[ "$status" == "200" ]]
          }

          publish_with_retries() {
            local crate="$1"
            local attempts=5
            local delay=20

            if already_published "$crate" "$version"; then
              echo "==> ${crate} ${version} already on crates.io — skipping"
              return 0
            fi

            for attempt in $(seq 1 "$attempts"); do
              echo "==> Publishing ${crate} ${version} (attempt ${attempt}/${attempts})"
              output=$(cargo publish -p "$crate" --locked 2>&1) && return 0

              if echo "$output" | grep -q "already exists\|already uploaded"; then
                echo "==> ${crate} ${version} already published"
                return 0
              fi

              echo "$output" >&2

              if [[ "$attempt" -lt "$attempts" ]]; then
                echo "==> Waiting ${delay}s before retry"
                sleep "$delay"
              fi
            done

            echo "ERROR: failed to publish ${crate} ${version} after ${attempts} attempts" >&2
            return 1
          }

          for crate in "${crates[@]}"; do
            publish_with_retries "$crate"
          done
