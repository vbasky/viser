name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: check + test + lint + doc
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: install system deps (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: install system deps (macos)
        if: runner.os == 'macOS'
        run: brew install fontconfig

      - name: install rust
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add clippy rustfmt

      - name: cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: fmt
        run: cargo fmt --check

      - name: check
        run: cargo check --workspace --all-targets

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install system deps
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev ffmpeg

      - name: install rust
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add llvm-tools-preview

      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-llvm-cov-${{ hashFiles('**/Cargo.lock') }}

      - name: coverage
        run: cargo llvm-cov --workspace --lcov --output-path coverage.lcov

      - name: coverage summary
        run: cargo llvm-cov --workspace --summary-only

      - name: upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-lcov
          path: coverage.lcov

      - name: doc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --document-private-items

  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install system deps
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: install rust 1.88
        run: |
          rustup toolchain install 1.88 --no-self-update
          rustup default 1.88

      - name: cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}

      - name: check
        run: cargo check --workspace --all-targets

  deny:
    name: cargo-deny (advisories + licenses + bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
