name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: check + test + lint + doc
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: install system deps (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: install system deps (macos)
        if: runner.os == 'macOS'
        run: brew install fontconfig

      - name: install rust
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add clippy rustfmt

      - name: cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: fmt
        run: cargo fmt --check

      - name: check
        run: cargo check --workspace --all-targets

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: install system deps
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev ffmpeg

      - name: install rust
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add llvm-tools-preview

      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-llvm-cov-${{ hashFiles('**/Cargo.lock') }}

      - name: coverage
        run: cargo llvm-cov --workspace --lcov --output-path coverage.lcov

      - name: coverage summary
        run: cargo llvm-cov report --summary-only

      - name: coverage json
        run: cargo llvm-cov report --json --output-path coverage.json

      - name: upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-lcov
          path: coverage.lcov

      - name: generate coverage badge
        run: |
          pct=$(jq -r '.data[0].totals.lines.percent' coverage.json)
          round=$(printf '%.0f' "$pct")
          if   [ "$round" -lt 50 ]; then color="#e05d44"
          elif [ "$round" -lt 60 ]; then color="#fe7d37"
          elif [ "$round" -lt 70 ]; then color="#dfb317"
          elif [ "$round" -lt 80 ]; then color="#a4a61d"
          elif [ "$round" -lt 90 ]; then color="#97ca00"
          else                          color="#4c1"
          fi
          label="coverage"; value="${round}%"
          # box widths: label letters ~6px, value (digits + %) ~7px, +12px padding.
          # no textLength -> glyphs render at natural width (no horizontal squish).
          lw=$((6 * ${#label} + 12)); vw=$((7 * ${#value} + 12)); total=$((lw + vw))
          lx=$((lw * 5)); vx=$(((lw * 2 + vw) * 5))
          mkdir -p badges
          printf '%s\n' \
          "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"$total\" height=\"20\" role=\"img\" aria-label=\"$label: $value\">" \
          "  <title>$label: $value</title>" \
          "  <linearGradient id=\"s\" x2=\"0\" y2=\"100%\">" \
          "    <stop offset=\"0\" stop-color=\"#bbb\" stop-opacity=\".1\"/>" \
          "    <stop offset=\"1\" stop-opacity=\".1\"/>" \
          "  </linearGradient>" \
          "  <clipPath id=\"r\"><rect width=\"$total\" height=\"20\" rx=\"3\" fill=\"#fff\"/></clipPath>" \
          "  <g clip-path=\"url(#r)\">" \
          "    <rect width=\"$lw\" height=\"20\" fill=\"#555\"/>" \
          "    <rect x=\"$lw\" width=\"$vw\" height=\"20\" fill=\"$color\"/>" \
          "    <rect width=\"$total\" height=\"20\" fill=\"url(#s)\"/>" \
          "  </g>" \
          "  <g fill=\"#fff\" text-anchor=\"middle\" font-family=\"Verdana,Geneva,DejaVu Sans,sans-serif\" text-rendering=\"geometricPrecision\" font-size=\"110\">" \
          "    <text aria-hidden=\"true\" x=\"$lx\" y=\"150\" fill=\"#010101\" fill-opacity=\".3\" transform=\"scale(.1)\">$label</text>" \
          "    <text x=\"$lx\" y=\"140\" transform=\"scale(.1)\" fill=\"#fff\">$label</text>" \
          "    <text aria-hidden=\"true\" x=\"$vx\" y=\"150\" fill=\"#010101\" fill-opacity=\".3\" transform=\"scale(.1)\">$value</text>" \
          "    <text x=\"$vx\" y=\"140\" transform=\"scale(.1)\" fill=\"#fff\">$value</text>" \
          "  </g>" \
          "</svg>" > badges/coverage.svg
          echo "coverage $value (color $color)"

      - name: commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- badges/coverage.svg; then
            git add badges/coverage.svg
            git commit -m "ci: update coverage badge [skip ci]"
            git push
          else
            echo "coverage badge unchanged"
          fi

      - name: doc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --document-private-items

  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install system deps
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: install rust 1.88
        run: |
          rustup toolchain install 1.88 --no-self-update
          rustup default 1.88

      - name: cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}

      - name: check
        run: cargo check --workspace --all-targets

  deny:
    name: cargo-deny (advisories + licenses + bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
