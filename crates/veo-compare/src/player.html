<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>VEO Comparison Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,sans-serif}
.header{padding:12px 20px;background:#16213e;border-bottom:1px solid #0f3460;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:16px}.stats{font-size:13px;opacity:.8}.stats .avg{color:#4ade80}.stats .min{color:#f87171}
.player-container{position:relative;width:100%;max-width:1280px;margin:20px auto;background:#000;aspect-ratio:16/9;overflow:hidden;cursor:col-resize}
.player-container video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain}
#enc-video{clip-path:inset(0 0 0 50%)}.slider-line{position:absolute;top:0;bottom:0;width:2px;background:#fff;left:50%;z-index:10;pointer-events:none}
.slider-handle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;background:rgba(255,255,255,.9);border-radius:50%;z-index:11;pointer-events:none;display:flex;align-items:center;justify-content:center;font-size:14px;color:#333}
.label-ref,.label-enc{position:absolute;top:8px;background:rgba(0,0,0,.7);padding:4px 10px;border-radius:4px;font-size:12px;z-index:5}
.label-ref{left:8px}.label-enc{right:8px}.vmaf-overlay{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);padding:6px 14px;border-radius:4px;font-size:14px;z-index:5}
.controls{max-width:1280px;margin:0 auto;padding:10px 20px}.controls button{background:#0f3460;border:1px solid #1a1a5e;color:#e0e0e0;padding:6px 14px;border-radius:4px;cursor:pointer;margin-right:6px;font-size:13px}
.time-display{font-size:13px;float:right;line-height:32px}.timeline{max-width:1280px;margin:10px auto;padding:0 20px}
.timeline-bar{position:relative;height:40px;background:#16213e;border-radius:4px;cursor:pointer;overflow:hidden}
.timeline-progress{position:absolute;top:0;left:0;height:100%;background:rgba(74,222,128,.2)}
.dip-marker{position:absolute;top:0;height:100%;width:3px;cursor:pointer;z-index:2}.dip-marker.warning{background:rgba(251,191,36,.7)}.dip-marker.critical{background:rgba(248,113,113,.8)}
.dip-list{max-width:1280px;margin:10px auto;padding:0 20px}.dip-list h3{font-size:14px;margin-bottom:8px;color:#f87171}
.dip-list .dips{display:flex;flex-wrap:wrap;gap:6px}.dip-btn{background:#16213e;border:1px solid #333;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;color:#e0e0e0}
</style></head><body>
<div class="header"><h1>VEO Comparison Player</h1><div class="stats">VMAF: avg <span class="avg" id="stat-avg">--</span> | min <span class="min" id="stat-min">--</span> | max <span id="stat-max">--</span> | <span id="stat-dips">0</span> dips</div></div>
<div class="player-container" id="ct"><video id="rv" muted playsinline></video><video id="enc-video" muted playsinline></video><div class="slider-line" id="sl"></div><div class="slider-handle" id="sh">&#x27F7;</div><div class="label-ref">Reference</div><div class="label-enc">Encoded</div><div class="vmaf-overlay" id="vo">VMAF: --</div></div>
<div class="controls"><button id="bp">&#9654; Play</button><button id="bpv">&#9664; Prev</button><button id="bn">Next &#9654;</button><button id="bpd">Prev Dip</button><button id="bnd">Next Dip</button><span class="time-display" id="td">0:00 / 0:00</span></div>
<div class="timeline"><div class="timeline-bar" id="tb"><div class="timeline-progress" id="tp"></div><canvas id="vc"></canvas></div></div>
<div class="dip-list" id="dl"><h3>Quality Dips</h3><div class="dips" id="db"></div></div>
<script>
let D=null,sp=.5,pl=false,di=-1;const rv=document.getElementById('rv'),ev=document.getElementById('enc-video'),ct=document.getElementById('ct'),sl=document.getElementById('sl'),sh=document.getElementById('sh'),vo=document.getElementById('vo'),tb=document.getElementById('tb'),tp=document.getElementById('tp'),vc=document.getElementById('vc');
fetch('/api/data').then(r=>r.json()).then(d=>{D=d;rv.src=d.referenceUrl;ev.src=d.encodedUrl;document.getElementById('stat-avg').textContent=d.avgVmaf.toFixed(1);document.getElementById('stat-min').textContent=d.minVmaf.toFixed(1);document.getElementById('stat-max').textContent=d.maxVmaf.toFixed(1);document.getElementById('stat-dips').textContent=d.dips.length;if(!d.dips.length)document.getElementById('dl').style.display='none';rv.addEventListener('loadedmetadata',()=>{dg();ad();});});
let dr=false;ct.onmousedown=e=>{dr=true;us(e)};ct.onmousemove=e=>{if(dr)us(e)};document.onmouseup=()=>{dr=false};
function us(e){const r=ct.getBoundingClientRect();sp=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));sl.style.left=sh.style.left=(sp*100)+'%';ev.style.clipPath='inset(0 0 0 '+(sp*100)+'%)';}
document.getElementById('bp').onclick=()=>{if(pl){rv.pause();ev.pause();document.getElementById('bp').textContent='\u25b6 Play'}else{rv.play();ev.play();document.getElementById('bp').textContent='\u23f8 Pause'}pl=!pl};
const fps=24;document.getElementById('bpv').onclick=()=>sk(-1/fps);document.getElementById('bn').onclick=()=>sk(1/fps);
function sk(dt){const t=Math.max(0,rv.currentTime+dt);rv.currentTime=t;ev.currentTime=t}
function st(t){rv.currentTime=t;ev.currentTime=t;if(pl){rv.pause();ev.pause();document.getElementById('bp').textContent='\u25b6 Play';pl=false}}
document.getElementById('bpd').onclick=()=>{if(!D||!D.dips.length)return;di=Math.max(0,di-1);st(D.dips[di].time)};
document.getElementById('bnd').onclick=()=>{if(!D||!D.dips.length)return;di=Math.min(D.dips.length-1,di+1);st(D.dips[di].time)};
tb.onclick=e=>{const r=tb.getBoundingClientRect();st((e.clientX-r.left)/r.width*rv.duration)};
function ui(){if(!rv.duration){requestAnimationFrame(ui);return}const t=rv.currentTime,d=rv.duration;if(Math.abs(ev.currentTime-t)>.1)ev.currentTime=t;tp.style.width=((t/d)*100)+'%';const f=s=>Math.floor(s/60)+':'+('0'+Math.floor(s%60)).slice(-2);document.getElementById('td').textContent=f(t)+' / '+f(d);if(D&&D.frames.length){const i=Math.min(Math.round(t*fps),D.frames.length-1),fr=D.frames[i];if(fr){const c=fr.vmaf>=90?'#4ade80':fr.vmaf>=70?'#fbbf24':'#f87171';vo.innerHTML='VMAF: <span style="color:'+c+'">'+fr.vmaf.toFixed(1)+'</span>'}}requestAnimationFrame(ui)}requestAnimationFrame(ui);
function dg(){if(!D||!D.frames.length)return;const r=tb.getBoundingClientRect();vc.width=r.width*2;vc.height=r.height*2;vc.style.width=r.width+'px';vc.style.height=r.height+'px';const c=vc.getContext('2d'),w=vc.width,h=vc.height,fr=D.frames,d=rv.duration||fr[fr.length-1].time;c.beginPath();c.strokeStyle='rgba(74,222,128,.6)';c.lineWidth=2;for(let i=0;i<fr.length;i++){const x=(fr[i].time/d)*w,y=h-(fr[i].vmaf/100)*h;i===0?c.moveTo(x,y):c.lineTo(x,y)}c.stroke();c.lineTo(w,h);c.lineTo(0,h);c.closePath();c.fillStyle='rgba(74,222,128,.08)';c.fill()}
function ad(){if(!D||!D.dips.length)return;const d=rv.duration||1,db=document.getElementById('db');D.dips.forEach((dp,i)=>{const m=document.createElement('div');m.className='dip-marker '+dp.severity;m.style.left=((dp.time/d)*100)+'%';m.onclick=e=>{e.stopPropagation();st(dp.time)};tb.appendChild(m);const b=document.createElement('button');b.className='dip-btn '+dp.severity;b.textContent=dp.time.toFixed(1)+'s (VMAF '+dp.vmaf.toFixed(0)+')';b.onclick=()=>{di=i;st(dp.time)};db.appendChild(b)})}
document.onkeydown=e=>{switch(e.key){case ' ':e.preventDefault();document.getElementById('bp').click();break;case 'ArrowLeft':sk(-1/fps);break;case 'ArrowRight':sk(1/fps);break;case '[':document.getElementById('bpd').click();break;case ']':document.getElementById('bnd').click();break}};
</script></body></html>
